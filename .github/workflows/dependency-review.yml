name: Dependency Review

on: pull_request

jobs:
  dependency-review:
    name: Dependency Review (CVE + Lizenz)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: >-
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            AGPL-1.0-only,
            SSPL-1.0,
            EUPL-1.1,
            EUPL-1.2,
            OSL-3.0,
            RPL-1.1,
            RPL-1.5
          allow-licenses: >-
            MIT,
            BSD-2-Clause,
            BSD-3-Clause,
            Apache-2.0,
            ISC,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            MPL-2.0,
            CC0-1.0,
            Unlicense
          comment-summary-in-pr: always
