name: Stale

on:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  stale:
    name: Stale PR Cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-pr-message: 'Dieser PR ist seit 30 Tagen inaktiv.'
